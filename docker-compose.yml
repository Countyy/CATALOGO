services:
  catalogodsr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalogodsr-app
    restart: always
    ports:
      - "10.122.83.135:8106:8106"
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://10.122.83.135:8106}
    networks:
      Servidores:
        ipv4_address: 10.122.83.135

networks:
  Servidores:
    external: true
